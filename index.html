<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>기부한 자원은 어떻게 다시 쓰일까요?</title>

    <!-- Pretendard -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<button id="fullscreenBtn" class="fullscreenBtn">
    ⛶ 
</button>

<div id="app">
    
<div id="app">

    <!-- ========================= -->
    <!-- HOME -->
    <!-- ========================= -->

    <main id="homePage">

        <header class="hero">

            <div class="heroLogo">

                ♻️

            </div>

            <h1>

                기부한 자원은<br>
                어떻게 다시 쓰일까요?

            </h1>

            <p>

                버려지는 물건도<br>
                새로운 자원이 될 수 있습니다.

            </p>

        </header>


        <section
            id="resourceGrid"
            class="resourceGrid">

            <!-- script.js가 자동 생성 -->

        </section>


        <footer class="homeFooter">

            <p>

                오늘은 기부가 어려우셨나요?

            </p>

            <span>

                이곳에서 자원의 새로운 이야기를 만나보세요.

            </span>

        </footer>

    </main>



    <!-- ========================= -->
    <!-- DETAIL -->
    <!-- ========================= -->

    <main
        id="detailPage"
        class="hidden">

        <button
            id="backButton"
            class="backButton">

            ← 다른 자원 보기

        </button>


        <section class="detailContainer">

            <header class="detailHeader">

                <div
                    id="detailIcon"
                    class="detailIcon">

                </div>

                <div class="detailTitleWrap">

                    <h2 id="detailTitle">

                    </h2>

                    <p id="detailIntro">

                    </p>

                </div>

            </header>


            <section
                id="timeline"
                class="timeline">

            </section>


            <section
                id="resultCard"
                class="resultCard">

            </section>

        </section>

    </main>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>

</html>
